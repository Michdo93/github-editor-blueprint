<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>GitHub Repo Editor</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  button { cursor: pointer; padding: 0.4rem 0.8rem; margin: 0.2rem; }
  textarea { width: 100%; height: 300px; font-family: monospace; }
  .hidden { display: none; }
  .row { display: flex; gap: 2rem; }
  .toolbar { margin-bottom: 0.5rem; }

  #file-tree { list-style: none; padding: 0; min-width: 260px; }
  .tree-node { }
  .tree-row {
    display: flex; align-items: center; gap: 0.3rem;
    padding: 0.15rem 0.3rem; cursor: pointer; border-radius: 4px;
  }
  .tree-row:hover { background: #eee; }
  .tree-row:hover .tree-actions { visibility: visible; }
  .tree-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-actions { visibility: hidden; display: flex; gap: 0.2rem; }
  .tree-actions button { padding: 0 0.3rem; margin: 0; font-size: 0.8rem; }
  .tree-children { margin-left: 1.1rem; }
  .folder-icon::before { content: "📁 "; }
  .file-icon::before { content: "📄 "; }
</style>
</head>
<body>

<h1>GitHub Repo Editor (Demo)</h1>

<!-- Login -->
<div id="login-view">
  <button id="login-btn">Mit GitHub einloggen</button>
</div>

<!-- Dashboard: Projekte anlegen / importieren -->
<div id="dashboard-view" class="hidden">
  <p>Angemeldet als <strong id="username"></strong>
     <button id="logout-btn">Logout</button></p>

  <h2>Neues Projekt</h2>
  <input id="new-project-name" placeholder="Projektname" />
  <button id="create-project-btn">Anlegen (erstellt Repo)</button>

  <h2>Vorhandenes Projekt importieren</h2>
  <select id="repo-select"></select>
  <button id="import-project-btn">Importieren</button>
</div>

<!-- Editor -->
<div id="editor-view" class="hidden">
  <p><button id="back-btn">&larr; Zur Projektliste</button>
     <strong id="project-name"></strong></p>

  <div class="toolbar">
    <button id="new-file-btn">+ Neue Datei</button>
    <button id="new-folder-btn">+ Neuer Ordner</button>
    <input type="file" id="upload-input" multiple />
    <span id="sync-status" style="color:#888;font-size:0.9em;"></span>
  </div>

  <div class="row">
    <div id="file-tree"></div>
    <div style="flex:1">
      <textarea id="editor-textarea" placeholder="Datei auswählen..."></textarea>
      <br />
      <button id="save-btn">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
import "./app.js";

const $ = (id) => document.getElementById(id);

let currentFile = null; // { path, sha }
let expandedFolders = new Set();

function showView(view) {
  ["login-view", "dashboard-view", "editor-view"].forEach((id) =>
    $(id).classList.toggle("hidden", id !== view)
  );
}

// Flache Dateiliste (aus getTree) in einen verschachtelten Ordnerbaum umwandeln
function buildTree(files) {
  const root = { folders: new Map(), files: [] };
  for (const f of files) {
    const parts = f.path.split("/");
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const folderPath = parts.slice(0, i + 1).join("/");
      if (!node.folders.has(parts[i])) {
        node.folders.set(parts[i], { folders: new Map(), files: [], fullPath: folderPath });
      }
      node = node.folders.get(parts[i]);
    }
    const fileName = parts[parts.length - 1];
    if (fileName !== ".gitkeep") {
      node.files.push({ name: fileName, path: f.path });
    }
  }
  return root;
}

function renderNode(node, container) {
  // Ordner zuerst, alphabetisch, dann Dateien
  const folderNames = [...node.folders.keys()].sort();
  for (const name of folderNames) {
    const child = node.folders.get(name);
    const li = document.createElement("div");
    li.className = "tree-node";

    const row = document.createElement("div");
    row.className = "tree-row";
    const expanded = expandedFolders.has(child.fullPath);

    const label = document.createElement("span");
    label.className = "tree-label folder-icon";
    label.textContent = name;
    label.onclick = () => {
      expanded ? expandedFolders.delete(child.fullPath) : expandedFolders.add(child.fullPath);
      renderFileTreeFrom(lastRenderedFiles);
    };

    const actions = document.createElement("span");
    actions.className = "tree-actions";
    actions.appendChild(makeActionBtn("✏", () => renamePrompt(child.fullPath, true)));
    actions.appendChild(makeActionBtn("🗑", () => deletePrompt(child.fullPath, true)));

    row.appendChild(label);
    row.appendChild(actions);
    li.appendChild(row);

    if (expanded) {
      const childrenDiv = document.createElement("div");
      childrenDiv.className = "tree-children";
      renderNode(child, childrenDiv);
      li.appendChild(childrenDiv);
    }
    container.appendChild(li);
  }

  const sortedFiles = [...node.files].sort((a, b) => a.name.localeCompare(b.name));
  for (const f of sortedFiles) {
    const row = document.createElement("div");
    row.className = "tree-row";

    const label = document.createElement("span");
    label.className = "tree-label file-icon";
    label.textContent = f.name;
    label.onclick = () => loadFileIntoEditor(f.path);

    const actions = document.createElement("span");
    actions.className = "tree-actions";
    actions.appendChild(makeActionBtn("✏", () => renamePrompt(f.path, false)));
    actions.appendChild(makeActionBtn("🗑", () => deletePrompt(f.path, false)));

    row.appendChild(label);
    row.appendChild(actions);
    container.appendChild(row);
  }
}

function makeActionBtn(symbol, onClick) {
  const btn = document.createElement("button");
  btn.textContent = symbol;
  btn.onclick = (e) => {
    e.stopPropagation();
    onClick();
  };
  return btn;
}

let lastRenderedFiles = [];

function renderFileTreeFrom(files) {
  lastRenderedFiles = files;
  const container = $("file-tree");
  container.innerHTML = "";
  renderNode(buildTree(files), container);
}

// Frischer Read von GitHub -- nur für Projekt-Start und externe Änderungen (Webhook) nutzen.
// NICHT direkt nach einer eigenen Schreibaktion aufrufen (Replikations-Verzögerung möglich)!
async function reloadFileTreeFromGitHub() {
  const files = await App.refreshFileTree();
  renderFileTreeFrom(files);
}

async function loadFileIntoEditor(path) {
  const { content, sha } = await App.openFile(path);
  currentFile = { path, sha };
  $("editor-textarea").value = content;
}

async function renamePrompt(path, isFolder) {
  const newPath = prompt(`Neuer Pfad für "${path}":`, path);
  if (!newPath || newPath === path) return;
  const files = await App.renamePathEntry(path, newPath, isFolder);
  if (currentFile?.path === path) currentFile.path = newPath;
  renderFileTreeFrom(files);
}

async function deletePrompt(path, isFolder) {
  const label = isFolder ? "Ordner (inkl. Inhalt)" : "Datei";
  if (!confirm(`${label} "${path}" wirklich löschen?`)) return;
  const files = await App.deletePathEntry(path, isFolder);
  if (currentFile?.path === path || (isFolder && currentFile?.path.startsWith(path + "/"))) {
    currentFile = null;
    $("editor-textarea").value = "";
  }
  renderFileTreeFrom(files);
}

// Sync-Status anzeigen, während im Hintergrund noch geschrieben/retried wird
window.addEventListener("sync-status", (e) => {
  $("sync-status").textContent = e.detail.pending > 0 ? "⏳ Synchronisiere mit GitHub …" : "";
});

// -- Login --------------------------------------------------------------
$("login-btn").onclick = () => App.redirectToGitHubLogin();
$("logout-btn").onclick = () => App.logout();

// -- Projekt anlegen / importieren ---------------------------------------
$("create-project-btn").onclick = async () => {
  const name = $("new-project-name").value.trim();
  if (!name) return;
  const project = await App.createNewProject(name);
  await enterEditor(project);
};

$("import-project-btn").onclick = async () => {
  const full = $("repo-select").value; // "owner/repo"
  const [owner, repo] = full.split("/");
  const project = await App.importExistingProject(owner, repo);
  await enterEditor(project);
};

$("back-btn").onclick = () => showView("dashboard-view");

async function enterEditor(project) {
  $("project-name").textContent = `${project.owner}/${project.repo}`;
  await App.openProject(project);
  await reloadFileTreeFromGitHub();
  showView("editor-view");
}

// Wenn sich ein anderer Client / GitHub selbst Änderungen macht -> Baum neu laden
window.addEventListener("repo-updated", () => reloadFileTreeFromGitHub());

// -- Speichern ------------------------------------------------------------
$("save-btn").onclick = async () => {
  if (!currentFile) return;
  const content = $("editor-textarea").value;
  const result = await App.saveFile(currentFile.path, content, currentFile.sha);
  currentFile.sha = result.content.sha;
};

// -- Neue Datei / Neuer Ordner ---------------------------------------------
$("new-file-btn").onclick = async () => {
  const path = prompt("Pfad der neuen Datei (z.B. src/neu.js):");
  if (!path) return;
  const files = await App.createFile(path);
  renderFileTreeFrom(files);
  await loadFileIntoEditor(path);
};

$("new-folder-btn").onclick = async () => {
  const path = prompt("Pfad des neuen Ordners (z.B. src/assets):");
  if (!path) return;
  expandedFolders.add(path);
  const files = await App.createFolder(path);
  renderFileTreeFrom(files);
};

// -- Upload -------------------------------------------------------------
$("upload-input").onchange = async (e) => {
  const files = [...e.target.files];
  const payload = await Promise.all(
    files.map(
      (f) =>
        new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve({ path: f.name, content: reader.result });
          reader.readAsText(f);
        })
    )
  );
  const updatedFiles = await App.uploadFiles(payload);
  e.target.value = "";
  renderFileTreeFrom(updatedFiles);
};

// -- Start ----------------------------------------------------------------
(async function init() {
  await App.handleOAuthRedirectIfPresent();
  const loggedIn = await App.tryRestoreSession();
  if (!loggedIn) {
    showView("login-view");
    return;
  }
  $("username").textContent = App.getCurrentUser().login;
  const repos = await App.listMyRepos();
  const select = $("repo-select");
  select.innerHTML = repos
    .map((r) => `<option value="${r.full_name}">${r.full_name}</option>`)
    .join("");
  showView("dashboard-view");
})();
</script>
</body>
</html>
